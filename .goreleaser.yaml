version: 2

project_name: ib

builds:
  - id: ib-linux
    main: ./cmd/ib
    binary: ib
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-linux-gnu.2.28
      - CXX=zig c++ -target x86_64-linux-gnu.2.28
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rwahyudi/gib/internal/ibcli.Version={{ .Version }} -X github.com/rwahyudi/gib/internal/ibcli.BuildDate={{ .Date }}
  - id: ib-windows
    main: ./cmd/ib
    binary: ib
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rwahyudi/gib/internal/ibcli.Version={{ .Version }} -X github.com/rwahyudi/gib/internal/ibcli.BuildDate={{ .Date }}

archives:
  - id: ib-linux
    ids:
      - ib-linux
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - THIRD_PARTY_LICENSES.md
  - id: ib-windows
    ids:
      - ib-windows
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - THIRD_PARTY_LICENSES.md

nfpms:
  - id: ib-linux-packages
    ids:
      - ib-linux
    package_name: ib
    vendor: rwahyudi
    homepage: https://github.com/rwahyudi/gib
    maintainer: rwahyudi
    description: Infoblox DNS command line client.
    license: MIT
    file_name_template: "{{ .PackageName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: packaging/bash_completion/ib
        dst: /etc/bash_completion.d/ib
        file_info:
          mode: 0644
      - src: LICENSE
        dst: /usr/share/doc/ib/LICENSE
        file_info:
          mode: 0644
      - src: THIRD_PARTY_LICENSES.md
        dst: /usr/share/doc/ib/THIRD_PARTY_LICENSES.md
        file_info:
          mode: 0644

checksum:
  name_template: checksums.txt

release:
  github:
    owner: rwahyudi
    name: gib
