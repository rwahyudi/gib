name: Sync Azure DevOps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-azure-devops
  cancel-in-progress: false

env:
  AZURE_DEVOPS_REPOSITORY_URL: ${{ vars.AZURE_DEVOPS_UNIX_GIB_URL || 'https://rwahyudi@dev.azure.com/rwahyudi/unix/_git/gib' }}

jobs:
  sync:
    name: Mirror Git refs to Azure DevOps
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push branches and tags
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_UNIX_GIB_PAT }}
        run: |
          if [ -z "${AZURE_DEVOPS_PAT}" ]; then
            echo "AZURE_DEVOPS_UNIX_GIB_PAT is not configured" >&2
            exit 1
          fi

          askpass="$(mktemp)"
          cat >"${askpass}" <<'EOF'
          #!/usr/bin/env sh
          case "$1" in
            *Username*) printf '%s\n' git ;;
            *Password*) printf '%s\n' "${AZURE_DEVOPS_PAT}" ;;
            *) printf '\n' ;;
          esac
          EOF
          chmod 700 "${askpass}"

          git remote add azure "${AZURE_DEVOPS_REPOSITORY_URL}"
          GIT_ASKPASS="${askpass}" GIT_TERMINAL_PROMPT=0 git \
            push --prune azure \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
