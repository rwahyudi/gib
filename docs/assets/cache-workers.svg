<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Animated ib cache, read endpoint, write endpoint, and worker flow</title>
  <desc id="desc">Multiple search workers read from SQLite cache, GET traffic goes to a GCM read endpoint, write traffic goes to the primary Grid Master, and a background refresh updates the cache.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .server { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 10; }
    .primary { fill: #fff7ed; stroke: #f97316; }
    .cache { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 10; }
    .worker { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 10; }
    .refresh { fill: #fdf4ff; stroke: #c026d3; stroke-width: 2; rx: 10; }
    .text { font: 600 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .small { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    .tiny { font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 8; }
    .read-line { stroke: #6366f1; }
    .write-line { stroke: #f97316; }
    .cache-line { stroke: #10b981; }
    .refresh-line { stroke: #c026d3; }
    .dot-read { fill: #4f46e5; }
    .dot-write { fill: #f97316; }
    .dot-cache { fill: #059669; }
    .dot-refresh { fill: #c026d3; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .worker1 { animation-delay: 0s; }
    .worker2 { animation-delay: .45s; }
    .worker3 { animation-delay: .9s; }
    @keyframes pulse {
      0%, 100% { opacity: .72; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.025); }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #020617; }
      .panel { fill: #0f172a; stroke: #334155; }
      .server { fill: #1e1b4b; stroke: #818cf8; }
      .primary { fill: #431407; stroke: #fb923c; }
      .cache { fill: #052e1a; stroke: #34d399; }
      .worker { fill: #082f49; stroke: #38bdf8; }
      .refresh { fill: #4a044e; stroke: #e879f9; }
      .text { fill: #f8fafc; }
      .small { fill: #cbd5e1; }
      .tiny { fill: #94a3b8; }
      .line { stroke: #64748b; }
    }
  </style>

  <defs>
    <path id="worker1-cache" d="M190 145 C290 145 335 250 445 250" />
    <path id="worker2-cache" d="M190 255 C290 255 335 270 445 270" />
    <path id="worker3-cache" d="M190 365 C290 365 335 290 445 290" />
    <path id="cache-read" d="M575 230 C665 150 725 130 830 125" />
    <path id="write-primary" d="M305 465 C495 500 690 500 830 410" />
    <path id="refresh-cache" d="M720 315 C650 350 580 345 525 315" />
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="980" height="560" />

  <rect class="panel" x="35" y="40" width="910" height="475" rx="16" />
  <text class="text" x="65" y="80">ib DNS Search, Cache, and Infoblox Routing</text>
  <text class="small" x="65" y="106">Workers return cached data quickly, read-only GETs can use GCM, and writes stay on the primary Grid Master.</text>

  <rect class="worker pulse worker1" x="70" y="120" width="120" height="50" rx="10" />
  <text class="text" x="103" y="151">Worker 1</text>
  <text class="tiny" x="82" y="168">zone A</text>

  <rect class="worker pulse worker2" x="70" y="230" width="120" height="50" rx="10" />
  <text class="text" x="103" y="261">Worker 2</text>
  <text class="tiny" x="82" y="278">zone B</text>

  <rect class="worker pulse worker3" x="70" y="340" width="120" height="50" rx="10" />
  <text class="text" x="103" y="371">Worker 3</text>
  <text class="tiny" x="82" y="388">zone C</text>

  <rect class="cache" x="445" y="210" width="150" height="120" rx="12" />
  <text class="text" x="476" y="249">SQLite</text>
  <text class="text" x="476" y="273">cache</text>
  <text class="tiny" x="464" y="302">record_cache</text>
  <text class="tiny" x="464" y="318">refresh_locks</text>

  <rect class="server" x="800" y="90" width="130" height="70" rx="12" />
  <text class="text" x="823" y="123">GCM</text>
  <text class="small" x="821" y="145">read endpoint</text>

  <rect class="server primary" x="800" y="380" width="130" height="70" rx="12" />
  <text class="text" x="819" y="413">Primary</text>
  <text class="small" x="815" y="435">Grid Master</text>

  <rect class="refresh pulse" x="610" y="300" width="140" height="60" rx="12" />
  <text class="text" x="635" y="329">Refresh</text>
  <text class="tiny" x="627" y="347">subprocess</text>

  <rect class="panel" x="70" y="445" width="235" height="48" rx="10" />
  <text class="text" x="95" y="475">create/edit/delete</text>

  <path class="line cache-line" d="M190 145 C290 145 335 250 445 250" marker-end="url(#arrow)" />
  <path class="line cache-line" d="M190 255 C290 255 335 270 445 270" marker-end="url(#arrow)" />
  <path class="line cache-line" d="M190 365 C290 365 335 290 445 290" marker-end="url(#arrow)" />
  <path class="line read-line" d="M575 230 C665 150 725 130 830 125" marker-end="url(#arrow)" />
  <path class="line write-line" d="M305 465 C495 500 690 500 830 410" marker-end="url(#arrow)" />
  <path class="line refresh-line" d="M720 315 C650 350 580 345 525 315" marker-end="url(#arrow)" />

  <circle class="dot-cache" r="7">
    <animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#worker1-cache" />
    </animateMotion>
  </circle>
  <circle class="dot-cache" r="7">
    <animateMotion dur="2.6s" begin=".45s" repeatCount="indefinite" rotate="auto">
      <mpath href="#worker2-cache" />
    </animateMotion>
  </circle>
  <circle class="dot-cache" r="7">
    <animateMotion dur="2.6s" begin=".9s" repeatCount="indefinite" rotate="auto">
      <mpath href="#worker3-cache" />
    </animateMotion>
  </circle>
  <circle class="dot-read" r="7">
    <animateMotion dur="3s" begin=".4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#cache-read" />
    </animateMotion>
  </circle>
  <circle class="dot-write" r="8">
    <animateMotion dur="3.8s" begin=".2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#write-primary" />
    </animateMotion>
  </circle>
  <circle class="dot-refresh" r="7">
    <animateMotion dur="3.2s" begin="1s" repeatCount="indefinite" rotate="auto">
      <mpath href="#refresh-cache" />
    </animateMotion>
  </circle>

  <text class="tiny" x="235" y="174">parallel cache checks</text>
  <text class="tiny" x="645" y="175">GET / SOA / allrecords</text>
  <text class="tiny" x="532" y="502">POST / PUT / DELETE</text>
  <text class="tiny" x="578" y="382">renew or replace cache</text>
</svg>
